<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성공적인 직업생활 시험 대비 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2230; --border: #30363d;
    --accent: #58a6ff; --accent2: #f78166; --accent3: #56d364; --text: #e6edf3;
    --text-muted: #8b949e; --correct: #1a4731; --correct-border: #56d364;
    --wrong: #4a1c1c; --wrong-border: #f85149; --yellow: #e3b341;
    --purple: #c678dd; --purple-bg: rgba(198,120,221,0.12); --purple-border: rgba(198,120,221,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

  /* ── 홈 화면 ── */
  #home-screen { display: flex; flex-direction: column; align-items: center; padding: 3rem 1.5rem 5rem; position: relative; overflow: hidden; }
  #home-screen::before { content: ''; position: absolute; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(88,166,255,0.10) 0%, transparent 70%); pointer-events: none; }
  #home-screen::after { content: ''; position: absolute; bottom: -150px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(86,211,100,0.08) 0%, transparent 70%); pointer-events: none; }
  .home-badge { background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.35); color: var(--accent); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; padding: 0.35rem 1rem; border-radius: 100px; margin-bottom: 1.5rem; text-transform: uppercase; }
  .home-title { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2rem, 5vw, 3.4rem); text-align: center; line-height: 1.15; margin-bottom: 0.8rem; background: linear-gradient(135deg, #e6edf3 0%, #58a6ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .home-sub { color: var(--text-muted); font-size: 0.95rem; text-align: center; margin-bottom: 2.5rem; line-height: 1.7; }
  .home-info { display: flex; gap: 1rem; margin-bottom: 2.5rem; }
  .home-info-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1.2rem; font-size: 0.82rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
  .home-info-chip strong { color: var(--accent); }

  .section-label { font-size: 0.82rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; width: 100%; max-width: 860px; display: flex; align-items: center; gap: 0.6rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── 문항 카드 그리드 ── */
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.9rem; width: 100%; max-width: 860px; margin-bottom: 2.5rem; }
  .topic-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 1rem 1.1rem; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden; user-select: none; }
  .topic-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); opacity: 0; transition: opacity 0.18s; }
  .topic-card:hover { border-color: var(--accent); background: rgba(88,166,255,0.07); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88,166,255,0.12); }
  .topic-card:hover::before { opacity: 1; }
  .topic-card.selected { border-color: var(--accent); background: rgba(88,166,255,0.12); }
  .topic-card.selected::before { opacity: 1; }
  .topic-card .t-num { font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 0.35rem; display: flex; align-items: center; gap: 0.3rem; }
  .topic-card .t-title { font-size: 0.86rem; font-weight: 700; color: var(--text); line-height: 1.4; }
  .topic-card .t-count { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.4rem; }
  .topic-card .t-check { position: absolute; top: 0.7rem; right: 0.7rem; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 0.6rem; color: #fff; }
  .topic-card.selected .t-check { display: flex; }

  .select-actions { display: flex; gap: 0.7rem; margin-bottom: 1.5rem; width: 100%; max-width: 860px; }
  .btn-sel { background: var(--card); border: 1.5px solid var(--border); color: var(--text-muted); padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; }
  .btn-sel:hover { border-color: var(--accent); color: var(--accent); }

  .start-bar { display: flex; align-items: center; gap: 1rem; width: 100%; max-width: 860px; padding: 1rem 1.2rem; background: var(--card); border: 1px solid var(--border); border-radius: 14px; }
  .start-bar-info { flex: 1; font-size: 0.88rem; color: var(--text-muted); }
  .start-bar-info strong { color: var(--accent); font-size: 1rem; }
  .btn-start-quiz { background: linear-gradient(135deg, #58a6ff, #388bfd); color: #fff; border: none; padding: 0.85rem 2rem; border-radius: 10px; font-size: 0.95rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(88,166,255,0.3); white-space: nowrap; }
  .btn-start-quiz:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(88,166,255,0.4); }
  .btn-start-quiz:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

  /* ── 퀴즈 화면 ── */
  #quiz-screen { display: none; max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .quiz-counter { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; }
  .quiz-counter span { color: var(--accent); font-size: 1rem; }
  .quiz-topic-badge { background: rgba(88,166,255,0.12); border: 1px solid rgba(88,166,255,0.25); color: var(--accent); font-size: 0.72rem; font-weight: 700; padding: 0.25rem 0.7rem; border-radius: 100px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-badge { background: rgba(86,211,100,0.15); border: 1px solid rgba(86,211,100,0.3); color: var(--accent3); font-size: 0.8rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 100px; }
  .quiz-sub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #58a6ff, #56d364); border-radius: 99px; transition: width 0.4s ease; }

  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.6rem; margin-bottom: 1.2rem; position: relative; overflow: hidden; }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #58a6ff, #388bfd); }
  .question-type { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.7rem; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
  .question-type::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .question-text { font-size: 1rem; font-weight: 500; line-height: 1.75; color: var(--text); }

  .choices { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.2rem; }
  .choice-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); padding: 0.85rem 1.1rem; border-radius: 10px; text-align: left; font-size: 0.9rem; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 0.75rem; line-height: 1.55; }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(88,166,255,0.08); transform: translateX(3px); }
  .choice-btn .choice-num { min-width: 24px; height: 24px; border-radius: 6px; background: var(--border); color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
  .choice-btn:hover:not(:disabled) .choice-num { background: var(--accent); color: #fff; }
  .choice-btn.correct { background: var(--correct); border-color: var(--correct-border); color: #fff; }
  .choice-btn.correct .choice-num { background: var(--correct-border); color: #fff; }
  .choice-btn.wrong { background: var(--wrong); border-color: var(--wrong-border); color: #fff; }
  .choice-btn.wrong .choice-num { background: var(--wrong-border); color: #fff; }
  .choice-btn:disabled { cursor: default; }

  .short-answer-wrap { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.2rem; }
  .short-input-row { display: flex; gap: 0.6rem; }
  .short-input { flex: 1; background: var(--surface); border: 1.5px solid var(--border); color: var(--text); padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.93rem; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.15s; }
  .short-input:focus { border-color: var(--accent); }
  .short-input.correct { border-color: var(--correct-border); background: var(--correct); }
  .short-input.wrong { border-color: var(--wrong-border); background: var(--wrong); }
  .btn-submit { background: var(--accent); color: #fff; border: none; padding: 0.8rem 1.3rem; border-radius: 10px; font-size: 0.88rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn-submit:hover { opacity: 0.85; } .btn-submit:disabled { opacity: 0.4; cursor: default; }
  .sa-hint { font-size: 0.82rem; color: var(--text-muted); }
  .sa-hint.correct-hint { color: var(--accent3); font-weight: 700; }
  .sa-hint.wrong-hint { color: var(--accent2); }

  .explanation { display: none; background: rgba(88,166,255,0.06); border: 1px solid rgba(88,166,255,0.2); border-radius: 10px; padding: 1rem 1.1rem; font-size: 0.87rem; color: #a8c9f7; line-height: 1.7; margin-bottom: 1.2rem; }
  .explanation .ex-label { font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; display: block; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }

  .btn-next { width: 100%; background: linear-gradient(135deg, #58a6ff, #388bfd); color: #fff; border: none; padding: 1rem; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: transform 0.15s, opacity 0.15s; display: none; }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ── 결과 화면 ── */
  #result-screen { display: none; max-width: 600px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; min-height: 100vh; justify-content: center; flex-direction: column; align-items: center; }
  .result-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; animation: pop 0.5s ease; }
  @keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; margin-bottom: 0.5rem; }
  .result-score { font-size: 3.2rem; font-weight: 900; margin: 1rem 0; }
  .result-score .sn { color: var(--accent); }
  .result-detail { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.92rem; line-height: 1.7; white-space: pre-line; }
  .result-topic-list { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; width: 100%; max-width: 400px; text-align: left; margin-bottom: 1.5rem; font-size: 0.82rem; color: var(--text-muted); }
  .result-topic-list strong { color: var(--text); display: block; margin-bottom: 0.5rem; font-size: 0.85rem; }
  .result-bars { width: 100%; max-width: 400px; margin: 0 auto 1.5rem; display: flex; flex-direction: column; gap: 0.7rem; }
  .result-bar-row { display: flex; align-items: center; gap: 0.8rem; font-size: 0.85rem; }
  .result-bar-label { width: 50px; text-align: right; color: var(--text-muted); flex-shrink: 0; }
  .result-bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .result-bar-fill-c { height: 100%; background: var(--accent3); border-radius: 99px; transition: width 1s ease; }
  .result-bar-fill-w { height: 100%; background: var(--accent2); border-radius: 99px; transition: width 1s ease; }
  .result-bar-count { width: 30px; font-weight: 700; }
  .result-buttons { display: flex; gap: 0.7rem; width: 100%; max-width: 400px; flex-wrap: wrap; }
  .btn-r { flex: 1; min-width: 80px; border: none; padding: 0.85rem 0.5rem; border-radius: 12px; font-size: 0.88rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.15s; }
  .btn-r:hover { opacity: 0.85; }
  .btn-r.retry { background: linear-gradient(135deg, #58a6ff, #388bfd); color: #fff; }
  .btn-r.home { background: var(--card); color: var(--text); border: 1.5px solid var(--border); }
  .btn-r.home:hover { border-color: var(--accent); }

  @media(max-width:600px){
    .topic-grid { grid-template-columns: repeat(2, 1fr); }
    .home-info { flex-wrap: wrap; justify-content: center; }
    .start-bar { flex-direction: column; text-align: center; }
    .question-text { font-size: 0.93rem; }
    .choice-btn { font-size: 0.83rem; padding: 0.75rem 0.9rem; }
  }
</style>
</head>
<body>

<!-- ════════ 홈 화면 ════════ -->
<div id="home-screen">
  <div class="home-badge">📚 1학기 기말고사 대비</div>
  <h1 class="home-title">성공적인<br>직업생활 퀴즈</h1>
  <p class="home-sub">학습할 문항을 선택하고 퀴즈를 시작하세요<br>문항마다 5~10개의 문제가 준비되어 있습니다</p>
  <div class="home-info">
    <div class="home-info-chip">📝 <strong>25개</strong> 단원</div>
    <div class="home-info-chip">🎲 <strong>랜덤</strong> 출제</div>
    <div class="home-info-chip">💡 <strong>즉시</strong> 해설</div>
  </div>

  <div class="section-label">단원 선택</div>
  <div class="select-actions">
    <button class="btn-sel" onclick="selectAll()">전체 선택</button>
    <button class="btn-sel" onclick="selectNone()">전체 해제</button>
  </div>
  <div class="topic-grid" id="topic-grid"></div>

  <div class="start-bar">
    <div class="start-bar-info" id="start-bar-info">선택된 단원: <strong>0</strong>개</div>
    <button class="btn-start-quiz" id="btn-start" onclick="startQuiz()" disabled>퀴즈 시작 →</button>
  </div>
</div>

<!-- ════════ 퀴즈 화면 ════════ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-counter">문제 <span id="cur-q">1</span> / <span id="total-q">10</span></div>
    <div class="score-badge">점수: <span id="live-score">0</span>점</div>
  </div>
  <div class="quiz-sub-header">
    <div class="quiz-topic-badge" id="quiz-topic-badge">단원명</div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="question-card" id="q-card">
    <div class="question-type" id="q-type">객관식</div>
    <div class="question-text" id="q-text"></div>
  </div>
  <div id="choices-area"></div>
  <div class="explanation" id="explanation"><span class="ex-label">💡 해설</span><span id="exp-text"></span></div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- ════════ 결과 화면 ════════ -->
<div id="result-screen">
  <span class="result-emoji" id="r-emoji">🎉</span>
  <h2 class="result-title" id="r-title">수고했어요!</h2>
  <div class="result-score"><span class="sn" id="r-score">0</span> <span style="font-size:1.4rem;color:var(--text-muted)">/ <span id="r-total">0</span></span></div>
  <p class="result-detail" id="r-detail"></p>
  <div class="result-topic-list" id="r-topic-list"></div>
  <div class="result-bars">
    <div class="result-bar-row">
      <span class="result-bar-label" style="color:var(--accent3)">정답</span>
      <div class="result-bar-track"><div class="result-bar-fill-c" id="bar-c" style="width:0%"></div></div>
      <span class="result-bar-count" style="color:var(--accent3)" id="cnt-c">0</span>
    </div>
    <div class="result-bar-row">
      <span class="result-bar-label" style="color:var(--accent2)">오답</span>
      <div class="result-bar-track"><div class="result-bar-fill-w" id="bar-w" style="width:0%"></div></div>
      <span class="result-bar-count" style="color:var(--accent2)" id="cnt-w">0</span>
    </div>
  </div>
  <div class="result-buttons">
    <button class="btn-r retry" onclick="retryQuiz()">🔄 다시 풀기</button>
    <button class="btn-r home" onclick="goHome()">🏠 단원 선택</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const LABELS = ['①','②','③','④','⑤'];
// 단답형 정답 판정: 순서·구분자·공백 모두 무관하게 비교
const checkSA = (input, answers) => {
  const norm = s => s.replace(/\s/g, '').toLowerCase();
  // 쉼표, 마침표, 슬래시, ·, 와, 과 등으로 분리 후 정렬
  const tokenize = s => s.split(/[,·\/\n]/).map(t => norm(t)).filter(Boolean).sort().join('|');
  const inputNorm = norm(input);
  const inputTok = tokenize(input);
  return answers.some(a => {
    const aNorm = norm(a);
    // 1) 완전 일치 (공백 제거 후)
    if (aNorm === inputNorm) return true;
    // 2) 토큰 집합 비교 (순서 무관, 구분자 무관)
    const aTok = tokenize(a);
    if (aTok === inputTok) return true;
    return false;
  });
};

function pickMC(choices, answerIdx, noShuffle) {
  if (noShuffle) return { sc: choices, ai: answerIdx };
  const correct = choices[answerIdx];
  const wrong = shuffle(choices.filter((_,i) => i !== answerIdx)).slice(0, 3);
  const pool = shuffle([correct, ...wrong]);
  return { sc: pool, ai: pool.indexOf(correct) };
}

// ════════════════════════════════════════════
// 문항 데이터 (25개 단원)
// ════════════════════════════════════════════
const TOPICS = [

  // ── 1번. 일과 직업의 의미 ──
  { id: 1, title: '일과 직업의 의미', questions: [
    { type:'mc', q:'다음 중 "일"의 개념으로 가장 적절한 것은?', choices:['인간이 살아가기 위해 삶의 과정에서 행하는 모든 생산적인 활동','경제적 소득을 얻기 위해 지속적으로 행하는 경제 활동','일정 기간 동안 반복하여 임금을 받는 노동','여가 활동과 취미 활동을 포함한 모든 행동'], answer:0, exp:'"일"은 인간이 살아가기 위해 삶의 과정에서 행하는 모든 생산적인 활동을 뜻하며, 놀이나 단순한 휴식은 제외됩니다.' },

const selectedIds = new Set();

function renderTopicGrid() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.id = 'tc-' + t.id;
    card.onclick = () => toggleTopic(t.id);
    card.innerHTML = `
      <div class="t-num">📌 ${t.id}번</div>
      <div class="t-title">${t.title}</div>
      <div class="t-count">${t.questions.length}문제</div>
      <div class="t-check">✓</div>
    `;
    grid.appendChild(card);
  });
}

function toggleTopic(id) {
  if (selectedIds.has(id)) { selectedIds.delete(id); }
  else { selectedIds.add(id); }
  document.getElementById('tc-' + id).classList.toggle('selected', selectedIds.has(id));
  updateStartBar();
}

function selectAll() {
  TOPICS.forEach(t => {
    selectedIds.add(t.id);
    document.getElementById('tc-' + t.id).classList.add('selected');
  });
  updateStartBar();
}

function selectNone() {
  selectedIds.clear();
  TOPICS.forEach(t => document.getElementById('tc-' + t.id).classList.remove('selected'));
  updateStartBar();
}

function updateStartBar() {
  const cnt = selectedIds.size;
  const totalQ = TOPICS.filter(t => selectedIds.has(t.id)).reduce((s, t) => s + t.questions.length, 0);
  document.getElementById('start-bar-info').innerHTML = `선택된 단원: <strong>${cnt}</strong>개 &nbsp;|&nbsp; 예상 문제 수: <strong>${totalQ}</strong>문제 (랜덤 출제)`;
  document.getElementById('btn-start').disabled = cnt === 0;
}

// ════════════════════════════════════════════
// 퀴즈 로직
// ════════════════════════════════════════════
let quizQuestions = [], currentIdx = 0, score = 0, answered = false;

function startQuiz() {
  // 선택된 단원에서 문제 수집 후 랜덤 배열
  let pool = [];
  TOPICS.filter(t => selectedIds.has(t.id)).forEach(t => {
    t.questions.forEach(q => pool.push({ ...q, topicTitle: t.title }));
  });
  quizQuestions = shuffle(pool);
  if (quizQuestions.length === 0) return;

  currentIdx = 0; score = 0; answered = false;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('total-q').textContent = quizQuestions.length;
  document.getElementById('live-score').textContent = 0;
  renderQuestion();
}

function retryQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  startQuiz();
}

function renderQuestion() {
  answered = false;
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;

  document.getElementById('cur-q').textContent = currentIdx + 1;
  document.getElementById('progress-fill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('quiz-topic-badge').textContent = q.topicTitle;
  document.getElementById('q-type').textContent = q.type === 'sa' ? '📝 단답형' : '✏️ 객관식';
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';

  const area = document.getElementById('choices-area');
  area.innerHTML = '';

  if (q.type === 'mc') {
    const { sc, ai } = pickMC(q.choices, q.answer, q.noShuffle || false);
    const div = document.createElement('div'); div.className = 'choices';
    sc.forEach((text, i) => {
      const btn = document.createElement('button'); btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-num">${LABELS[i]}</span><span>${text}</span>`;
      btn.onclick = () => handleMC(i, btn, div, ai, q);
      div.appendChild(btn);
    });
    area.appendChild(div);
  } else {
    const wrap = document.createElement('div'); wrap.className = 'short-answer-wrap';
    const row = document.createElement('div'); row.className = 'short-input-row';
    const inp = document.createElement('input'); inp.className = 'short-input'; inp.type = 'text'; inp.placeholder = '정답을 입력하세요';
    const sbtn = document.createElement('button'); sbtn.className = 'btn-submit'; sbtn.textContent = '제출';
    const hint = document.createElement('div'); hint.className = 'sa-hint';
    const doSub = () => submitSA(inp, sbtn, hint, q);
    inp.onkeydown = e => { if (e.key === 'Enter') doSub(); };
    sbtn.onclick = doSub;
    row.appendChild(inp); row.appendChild(sbtn); wrap.appendChild(row); wrap.appendChild(hint);
    area.appendChild(wrap);
    setTimeout(() => inp.focus(), 100);
  }
}

function handleMC(idx, btn, div, correctIdx, q) {
  if (answered) return; answered = true;
  const btns = div.querySelectorAll('.choice-btn'); btns.forEach(b => b.disabled = true);
  const isCorrect = idx === correctIdx;
  btns[correctIdx].classList.add('correct');
  if (!isCorrect) btn.classList.add('wrong');
  if (isCorrect) score++;
  document.getElementById('live-score').textContent = score;
  showExp(q.exp);
}

function submitSA(inp, sbtn, hint, q) {
  if (answered) return;
  const val = inp.value.trim(); if (!val) return;
  answered = true; inp.disabled = true; sbtn.disabled = true;
  const ok = checkSA(val, q.answers);
  if (ok) { inp.classList.add('correct'); hint.className = 'sa-hint correct-hint'; hint.textContent = '✅ 정답입니다!'; score++; }
  else { inp.classList.add('wrong'); hint.className = 'sa-hint wrong-hint'; hint.textContent = `❌ 오답 — 정답: ${q.answers[0]}`; }
  document.getElementById('live-score').textContent = score;
  showExp(q.exp);
}

function showExp(text) {
  const el = document.getElementById('explanation');
  document.getElementById('exp-text').textContent = text;
  el.style.display = 'block';
  const nb = document.getElementById('btn-next');
  nb.style.display = 'block';
  nb.textContent = currentIdx < quizQuestions.length - 1 ? '다음 문제 →' : '결과 보기 🏁';
  nb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= quizQuestions.length) showResult();
  else { renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

// ════════════════════════════════════════════
// 결과 화면
// ════════════════════════════════════════════
function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';
  const total = quizQuestions.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-total').textContent = total;
  document.getElementById('cnt-c').textContent = score;
  document.getElementById('cnt-w').textContent = total - score;
  setTimeout(() => {
    document.getElementById('bar-c').style.width = (score / total * 100) + '%';
    document.getElementById('bar-w').style.width = ((total - score) / total * 100) + '%';
  }, 200);

  let emoji, title, detail;
  if (pct >= 90) { emoji = '🏆'; title = '완벽해요!'; detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n직업생활 단원 완전 정복!`; }
  else if (pct >= 70) { emoji = '😊'; title = '잘했어요!'; detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n조금만 더 보강하면 만점!`; }
  else if (pct >= 50) { emoji = '📖'; title = '더 공부해요!'; detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n오답 단원을 다시 선택해서 풀어보세요.`; }
  else { emoji = '💪'; title = '다시 도전!'; detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n핵심 개념을 다시 복습해요.`; }

  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-detail').textContent = detail;

  const tl = document.getElementById('r-topic-list');
  const selectedNames = TOPICS.filter(t => selectedIds.has(t.id)).map(t => `${t.id}번. ${t.title}`);
  tl.innerHTML = `<strong>📚 학습한 단원</strong>${selectedNames.join(' · ')}`;
}

function goHome() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'flex';
  updateStartBar();
}

// ════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════
renderTopicGrid();
updateStartBar();
</script>
</body>
</html>
